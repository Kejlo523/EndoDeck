name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - name: Restore Android release keystore
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if (-not $env:ANDROID_KEYSTORE_BASE64) { throw 'Missing ANDROID_KEYSTORE_BASE64 secret' }
          [IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\android-release.jks", [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))
      - run: npm run prepare:assets
      - run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/fetch-platform-tools.ps1
      - run: npm run build:native
      - run: npm run build:android
        env:
          ENDODECK_ANDROID_KEYSTORE: ${{ github.workspace }}\android-release.jks
          ENDODECK_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ENDODECK_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ENDODECK_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - run: npm run build:magisk
      - run: npm run release:manifest
        env:
          ENDODECK_RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_ED25519_PRIVATE_KEY }}
      - run: npm run build:desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm sbom --sbom-format=cyclonedx | Set-Content release/EndoDeck-SBOM.cdx.json -Encoding utf8
        shell: pwsh
      - run: npm run release:manifest
        env:
          ENDODECK_RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_ED25519_PRIVATE_KEY }}
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: |
            release/*
            dist/*.apk
            dist/*Magisk.zip
            dist/release-manifest.*
            dist/SHA256SUMS
